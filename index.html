<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бесконечный замок</title>

<style>
body {
    margin: 0;
    background: #0e0f14;
    color: white;
    font-family: Arial;
    overflow: hidden;
    text-align: center;
}

/* ===== FULLSCREEN GATE ===== */
#fsGate {
    position: fixed;
    inset: 0;
    background: #0b0c10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#fsGate button {
    padding: 12px 20px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    background: white;
    color: black;
    border-radius: 8px;
}

/* ===== ROOM SYSTEM ===== */
.room {
    display: none;
    height: 100vh;
    position: relative;
    animation: fadeIn 0.5s ease;
}

.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(1.02); }
    to { opacity: 1; transform: scale(1); }
}

/* ===== LIGHT ===== */
.top {
    position: absolute;
    top: 10px;
    width: 100%;
}

.top img {
    width: min(180px, 40vw);
    opacity: 0.9;
}

/* ===== CENTER ===== */
.center {
    position: absolute;
    top: 18vh;
    width: 100%;
}

.center h2 {
    font-size: clamp(32px, 6vw, 60px);
}

/* ===== DOORS ===== */
.doors {
    position: absolute;
    bottom: 8vh;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 4vw;
    flex-wrap: wrap;
}

.door img {
    width: min(160px, 28vw);
    cursor: pointer;
    transition: transform 0.4s ease, opacity 0.4s ease;
}

.door img:active {
    transform: scale(1.1);
}

/* ===== ATMOSPHERE ===== */
.room::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 50%),
        radial-gradient(circle at center, rgba(0,0,0,0.5), transparent 70%);
}

/* ===== FX LAYER ===== */
.fx {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9998;
}

/* туман */
.fog {
    background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
}

/* снег */
.snow {
    background: url("https://i.ibb.co/6bQ7J1B/snow.gif");
    opacity: 0.15;
}

/* дождь */
.rain {
    background: url("https://i.imgur.com/r9G7QyQ.gif");
    opacity: 0.20;
    mix-blend-mode: screen;
}

/* гроза */
.storm {
    animation: flash 2.8s infinite;
}

@keyframes flash {
    92% { filter: brightness(1); }
    94% { filter: brightness(2); }
    96% { filter: brightness(0.6); }
}
</style>
</head>

<body>

<div id="fsGate">
    <h1>⚠️ Бесконечный замок</h1>
    <button onclick="enterFS()">войти в игру</button>
</div>

<div id="fx" class="fx"></div>

<!-- ROOMS -->
<div class="room active" id="r1">
    <div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div>
    <div class="center"><h2>1</h2></div>
    <div class="doors">
        <div class="door"><img onclick="go(2)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door"><img onclick="go(3)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door"><img onclick="go(4)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
    </div>
</div>

<div class="room" id="r2"> ... (оставил как у тебя, не ломаю структуру) </div>
<div class="room" id="r3"> ... </div>
<div class="room" id="r4"> ... </div>
<div class="room" id="r5"> ... </div>
<div class="room" id="r6"> ... </div>
<div class="room" id="r7"> ... </div>
<div class="room" id="r8"> ... </div>
<div class="room" id="r9"> ... </div>
<div class="room" id="r10"> ... </div>

<script>

let locked = false;

const fxMap = {
    1: "fog",
    2: "rain",
    3: "storm",
    4: "fog",
    5: "",
    6: "snow",
    7: "storm",
    8: "fog",
    9: "rain",
    10: "storm"
};

function enterFS(){
    document.documentElement.requestFullscreen();
    document.getElementById("fsGate").style.display = "none";
}

function go(n){
    if(locked) return;
    locked = true;

    setTimeout(() => {
        document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
        document.getElementById('r'+n).classList.add('active');

        const fx = document.getElementById("fx");
        fx.className = "fx " + (fxMap[n] || "");

        locked = false;
    }, 400);
}

</script>

</body>
</html>
