<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бесконечный замок</title>

<style>
body {
    margin: 0;
    background: #0e0f14;
    color: white;
    font-family: Arial;
    overflow: hidden;
    text-align: center;
}

/* ===== FULLSCREEN GATE ===== */
#fsGate {
    position: fixed;
    inset: 0;
    background: #0b0c10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#fsGate button {
    padding: 12px 20px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    background: white;
    color: black;
    border-radius: 8px;
}

/* ===== ROOM SYSTEM ===== */
.room {
    display: none;
    height: 100vh;
    position: relative;
    animation: fadeIn 0.5s ease;
}

.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(1.02); }
    to { opacity: 1; transform: scale(1); }
}

/* ===== LIGHT ===== */
.top {
    position: absolute;
    top: 10px;
    width: 100%;
}

.top img {
    width: min(180px, 40vw);
    opacity: 0.9;
}

/* ===== CENTER ===== */
.center {
    position: absolute;
    top: 18vh;
    width: 100%;
}

.center h2 {
    font-size: clamp(32px, 6vw, 60px);
}

/* ===== DOORS ===== */
.doors {
    position: absolute;
    bottom: 8vh;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 4vw;
    flex-wrap: wrap;
}

.door {
    cursor: pointer;
    transition: transform 0.5s ease, opacity 0.5s ease;
}

.door img {
    width: min(160px, 28vw);
}

.door.opening {
    transform: scale(1.2) rotateY(25deg);
    opacity: 0;
}

/* ===== ATMOSPHERE ===== */
.room::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 50%),
        radial-gradient(circle at center, rgba(0,0,0,0.5), transparent 70%);
}
</style>
</head>

<body>

<!-- FULLSCREEN -->
<div id="fsGate">
    <h1>⚠️ Бесконечный замок</h1>
    <p>Вы не сможете играть без полноэкранного режима</p>
    <button onclick="enterFS()">Войти в игру</button>
</div>

<!-- ROOMS -->

    <div class="center"><h2>1</h2></div>

    <div class="doors">
        <div class="door" onclick="go(2,this)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door" onclick="go(3,this)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door" onclick="go(4,this)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
    </div>
</div>

    <div class="center"><h2>2</h2></div>

        <div class="door" onclick="go(6,this)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door" onclick="go(1,this)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>

<div class="room" id="r10">
    <div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div>
    <div class="center"><h2>10</h2></div>

    <div class="doors">
        <div class="door" onclick="finish(this)">
            <img src="https://i.postimg.cc/ZRXxf9dr/otkrytayadver.png">
        </div>
    </div>
</div>

<script>

let locked = false;

/* FULLSCREEN */
function enterFS(){
    let el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    document.getElementById("fsGate").style.display = "none";
}

/* ANTI-SPAM NAVIGATION */
function go(n, el){

    if(locked) return;
    locked = true;

    if(el){
        el.classList.add("opening");
    }

    setTimeout(() => {
        changeRoom(n);
        locked = false;
    }, 500);
}

/* ROOM SWITCH */
function changeRoom(n){
    document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
    document.getElementById('r'+n).classList.add('active');
}

/* FINISH */
function finish(el){
    if(locked) return;
    locked = true;

    if(el){
        el.classList.add("opening");
    }

    setTimeout(() => {
        alert("Ты выбрался из замка...");
        locked = false;
    }, 800);
}

</script>
