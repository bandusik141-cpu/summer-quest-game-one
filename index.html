<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бесконечный замок</title>

<style>
body {
    margin: 0;
    background: #0e0f14;
    color: white;
    font-family: Arial;
    overflow: hidden;
    text-align: center;
}

.room {
    display: none;
    height: 100vh;
    position: relative;
    padding-top: 20px;
}

.active {
    display: block;
}

.top {
    position: absolute;
    top: 10px;
    width: 100%;
}

.top img {
    width: 140px;
    opacity: 0.9;
}

.center {
    position: absolute;
    top: 90px;
    width: 100%;
}

.doors {
    position: absolute;
    bottom: 80px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 60px;
}

.door {
    cursor: pointer;
    transition: 0.2s;
}

.door img {
    width: 140px;
}

.door:hover {
    transform: scale(1.05);
}

.single {
    justify-content: center;
}

h2 {
    margin-top: 120px;
}
</style>

</head>
<body>

<!-- ROOM TEMPLATE STYLE -->
<!-- ROOM 1 -->
<div class="room active" id="r1">
    <div class="top">
        <img src="https://i.postimg.cc/TwBJkyDC/lampa.png">
    </div>

    <div class="center"><h2>1</h2></div>

    <div class="doors">
        <div class="door" onclick="go(2)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door" onclick="go(3)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door" onclick="go(4)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
    </div>
</div>

<!-- ROOM 2 -->
<div class="room" id="r2">
    <div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div>
    <div class="center"><h2>2</h2></div>

    <div class="doors">
        <div class="door" onclick="go(5)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door" onclick="go(6)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door" onclick="go(1)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
    </div>
</div>

        <div class="door" onclick="go(5)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
    </div>
</div>

<!-- ROOM 4 -->

    <div class="center"><h2>4</h2></div>

    <div class="doors">
        <div class="door" onclick="go(3)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door" onclick="go(8)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>

    </div>
</div>

<!-- ROOM 10 FINAL -->
<div class="room" id="r10">
    <div class="top">
        <img src="https://i.postimg.cc/TwBJkyDC/lampa.png">
    </div>

    <div class="center">
        <h2>10</h2>
        <p>...</p>
    </div>

    <div class="doors single">
        <div class="door" onclick="finish()">
            <img src="https://i.postimg.cc/ZRXxf9dr/otkrytayadver.png">
        </div>
    </div>
</div>

<script>
function go(n){
    document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
    document.getElementById('r'+n).classList.add('active');
}

function finish(){
    alert("Ты прошёл замок...");
    // сюда потом вставим Google Docs или фрагмент
}
</script>

</body>
</html>
