<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бесконечный замок</title>

<style>
body {
    margin: 0;
    background: #0e0f14;
    color: white;
    font-family: Arial;
    overflow: hidden;
    text-align: center;
}

/* ===== КОМНАТЫ ===== */
.room {
    display: none;
    height: 100vh;
    position: relative;
    animation: fadeIn 0.5s ease;
}

.active {
    display: block;
}

/* ===== АНИМАЦИЯ КОМНАТЫ ===== */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(1.02); }
    to { opacity: 1; transform: scale(1); }
}

/* ===== ЛЮСТРА / ЧАСЫ ===== */
.top {
    position: absolute;
    top: 10px;
    width: 100%;
}

.top img {
    width: min(180px, 40vw);
    opacity: 0.9;
}

/* ===== ЦЕНТР ===== */
.center {
    position: absolute;
    top: 18vh;
    width: 100%;
}

.center h2 {
    font-size: clamp(32px, 6vw, 60px);
}

/* ===== ДВЕРИ ===== */
.doors {
    position: absolute;
    bottom: 8vh;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 4vw;
    flex-wrap: wrap;
}

.door {
    cursor: pointer;
    transition: transform 0.5s ease, opacity 0.5s ease;
}

.door img {
    width: min(160px, 28vw);
}

.door.opening {
    transform: scale(1.2) rotateY(20deg);
    opacity: 0;
}

/* ===== ТУМАН ===== */
.room::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 60%);
    pointer-events: none;
}
</style>

</head>
<body>

<!-- ========== ROOM 1 ========== -->
<div class="room active" id="r1">
    <div class="top">
        <img src="https://i.postimg.cc/TwBJkyDC/lampa.png">
    </div>

    <div class="center"><h2>1</h2></div>

    <div class="doors">
        <div class="door" onclick="go(2,this)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door" onclick="go(3,this)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
        <div class="door" onclick="go(4,this)"><img src="https://i.postimg.cc/wvnQWtmk/dver.png"></div>
    </div>
</div>

    <div class="center">

    </div>

    <div class="doors">
        <div class="door" onclick="finish()">
            <img src="https://i.postimg.cc/ZRXxf9dr/otkrytayadver.png">
        </div>
    </div>
</div>

<script>
function go(n, el){
    if(el){
        el.classList.add("opening");

        setTimeout(() => {
            changeRoom(n);
        }, 500);
    } else {
        changeRoom(n);
    }
}

function changeRoom(n){
    document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
    document.getElementById('r'+n).classList.add('active');
}

function finish(){
    alert("Квест завершён...");
}
</script>

</body>
