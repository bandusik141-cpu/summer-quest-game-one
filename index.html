<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесконечный замок: Тьма</title>
    <style>
        :root {
            --bg-color: #0e0f14;
            --accent-red: #4a0000;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: white;
            font-family: 'Georgia', serif;
            overflow: hidden;
            text-align: center;
            transition: background 1s ease;
        }

        /* ===== FULLSCREEN GATE ===== */
        #fsGate {
            position: fixed;
            inset: 0;
            background: #0b0c10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #fsGate h1 { font-size: 2.5rem; margin-bottom: 10px; }
        #fsGate p { margin-bottom: 20px; opacity: 0.8; }

        #fsGate button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 4px;
            transition: 0.3s;
        }

        #fsGate button:hover {
            background: white;
            color: black;
        }

        /* ===== UI ELEMENTS ===== */
        #stats {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 1rem;
            opacity: 0.6;
            z-index: 100;
        }

        #atmosphere {
            position: fixed;
            bottom: 40px;
            width: 100%;
            font-style: italic;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
            z-index: 100;
        }

        /* ===== ROOM SYSTEM ===== */
        #game-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .room-view {
            opacity: 1;
            transition: opacity 0.8s ease, transform 0.8s ease;
            width: 100%;
        }

        .room-view.fade-out {
            opacity: 0;
            transform: scale(0.95);
        }

        /* ===== LIGHT & LAMP ===== */
        .lamp-container {
            margin-top: 20px;
            perspective: 1000px;
        }

        .lamp {
            width: min(180px, 40vw);
            opacity: 0.9;
            animation: swing 4s ease-in-out infinite;
            transform-origin: top center;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .flicker {
            animation: flicker 0.2s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { opacity: 0.9; }
        }

        /* ===== CENTER ===== */
        .room-number {
            font-size: clamp(40px, 8vw, 80px);
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* ===== DOORS ===== */
        .doors {
            display: flex;
            justify-content: center;
            gap: 5vw;
            flex-wrap: wrap;
            margin-bottom: 5vh;
        }

        .door {
            position: relative;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .door img {
            width: min(160px, 28vw);
            display: block;
        }

        .door:hover {
            transform: scale(1.05) translateY(-5px);
        }

        .door:active {
            transform: scale(0.9);
        }

        /* ===== VIGNETTE & FOG ===== */
        .overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            z-index: 10;
        }

        #fog {
            position: fixed;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: 5;
            animation: fogMove 20s linear infinite;
        }

        @keyframes fogMove {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* ===== SPECIAL STATES ===== */
        .red-room {
            background: var(--accent-red) !important;
        }

        /* ===== WIN SCREEN ===== */
        #winScreen {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #winScreen h1 { font-size: 3rem; margin-bottom: 20px; }
        #winScreen p { font-size: 1.5rem; opacity: 0.7; }
        
        .next-btn {
            background: #ff9e00;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            text-decoration: none;
            transition: 0.3s;
        }
        .next-btn:hover { background: #ff7b00; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="fsGate">
    <h1>🏰 Бесконечный замок</h1>
    <p>Тьма ждет тебя внутри...</p>
    <button onclick="enterFS()">Войти в игру</button>
</div>

<div id="stats">Шаги: <span id="stepCount">0</span></div>
<div id="atmosphere"></div>
<div class="overlay"></div>
<div id="fog"></div>

<div id="game-container">
    <div class="room-view" id="roomView">
        <div class="lamp-container">
            <img id="lampImg" src="https://i.postimg.cc/TwBJkyDC/lampa.png" class="lamp">
        </div>
        
        <div class="room-number" id="roomNumDisplay">1</div>
        
        <div class="doors" id="doorContainer">
            <!-- Doors will be generated by JS -->
        </div>
    </div>
</div>

<div id="winScreen">
    <h1>Ты выбрался из замка...</h1>
    <p>Но путь к истине ещё не окончен.</p>
    <a href="ССЫЛКА_НА_ИГРУ_2" id="nextLink" class="next-btn">Идти в пляжный бар ➔</a>
</div>

<script>
    // --- НАСТРОЙКИ ---
    const NEXT_GAME_URL = "https://bandusik141-cpu.github.io/summer-quest-game-two/"; // ВСТАВЬ ССЫЛКУ НА 2-Ю ИГРУ
    const TOTAL_ROOMS = 30;
    const CORRECT_PATH = [1, 4, 9, 12, 15, 18, 22, 25, 27, 29, 30];
    
    let currentRoom = 1;
    let steps = 0;
    let locked = false;

    const phrases = [
        "Ты уверен, что уже не был здесь?",
        "Стены кажутся тухлыми...",
        "Одна из дверей выглядит знакомо. Ты точно не видел уже эти царапины на ней?",
        "В тишине слышится тихий скрип. Господи, соседи, потише а.",
        "Холод пробирает до костей. Ты словно оКОСТЬенел. ^_^",
        "Кто-то наблюдает за тобой из тени. Это точно не Сатору?",
        "Твои шаги звучат слишком громко. Хватит гупать, слоняра.",
        "Замок не хочет тебя отпускать. Отпути, не путю, ну кому я говорю."
    ];

    const doorImgNormal = "https://i.postimg.cc/wvnQWtmk/dver.png";
    const doorImgOpen = "https://i.postimg.cc/ZRXxf9dr/otkrytayadver.png";

    function enterFS() {
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }
        document.getElementById("fsGate").style.display = "none";
        initRoom();
    }

    function initRoom() {
        const view = document.getElementById('roomView');
        const numDisplay = document.getElementById('roomNumDisplay');
        const doorContainer = document.getElementById('doorContainer');
        const lamp = document.getElementById('lampImg');
        const atmos = document.getElementById('atmosphere');
        
        document.body.classList.remove('red-room');
        lamp.classList.remove('flicker');
        numDisplay.style.opacity = "1";
        document.getElementById('stepCount').innerText = steps;
        numDisplay.innerText = currentRoom;
        
        if (steps > 0 && steps % 3 === 0) {
            atmos.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            atmos.style.opacity = "0.6";
            setTimeout(() => atmos.style.opacity = "0", 3000);
        }

        const isRedRoom = Math.random() > 0.9;
        const isBrokenLamp = Math.random() > 0.85;

        if (isRedRoom) document.body.classList.add('red-room');
        if (isBrokenLamp) {
            lamp.classList.add('flicker');
            numDisplay.style.opacity = "0.2";
        }

        doorContainer.innerHTML = "";
        let doorCount = 3;
        if (currentRoom === 30) doorCount = 1;
        
        let doors = [];
        if (currentRoom === 30) {
            doors.push({ target: 'win', type: 'exit' });
        } else {
            let nextCorrect = -1;
            const pathIdx = CORRECT_PATH.indexOf(currentRoom);
            if (pathIdx !== -1 && pathIdx < CORRECT_PATH.length - 1) {
                nextCorrect = CORRECT_PATH[pathIdx + 1];
            }

            for (let i = 0; i < doorCount; i++) {
                let target;
                if (i === 0 && nextCorrect !== -1) {
                    target = nextCorrect;
                } else {
                    target = Math.floor(Math.random() * (TOTAL_ROOMS - 1)) + 1;
                    if (target === currentRoom) target = 1; 
                }
                let type = (target !== nextCorrect && Math.random() > 0.8) ? 'trap' : 'normal';
                doors.push({ target, type });
            }
        }

        if (currentRoom !== 30) doors.sort(() => Math.random() - 0.5);

        doors.forEach(d => {
            const doorDiv = document.createElement('div');
            doorDiv.className = 'door';
            const img = document.createElement('img');
            img.src = (d.type === 'exit') ? doorImgOpen : doorImgNormal;
            
            doorDiv.onclick = () => {
                if (d.type === 'exit') finish();
                else if (d.type === 'trap') triggerTrap();
                else go(d.target);
            };
            
            doorDiv.appendChild(img);
            doorContainer.appendChild(doorDiv);
        });

        view.classList.remove('fade-out');
        locked = false;
    }

    function go(n) {
        if (locked) return;
        locked = true;
        steps++;
        document.getElementById('roomView').classList.add('fade-out');
        setTimeout(() => {
            currentRoom = n;
            initRoom();
        }, 800);
    }

    function triggerTrap() {
        if (locked) return;
        locked = true;
        steps++;
        document.getElementById('atmosphere').innerText = "Ты чувствуешь надежду...";
        document.getElementById('atmosphere').style.opacity = "1";
        document.getElementById('roomView').classList.add('fade-out');
        setTimeout(() => {
            document.getElementById('atmosphere').style.opacity = "0";
            currentRoom = 1;
            initRoom();
        }, 1500);
    }

    function finish() {
        if (locked) return;
        locked = true;
        steps++;
        document.getElementById('roomView').classList.add('fade-out');
        setTimeout(() => {
            document.getElementById('winScreen').style.display = 'flex';
            document.getElementById('nextLink').href = NEXT_GAME_URL;
        }, 1000);
    }
</script>

</body>
</html>
