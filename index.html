<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бесконечный замок</title>

<style>
body {
    margin: 0;
    background: #0e0f14;
    color: white;
    font-family: Arial;
    overflow: hidden;
    text-align: center;
}

/* ===== FULLSCREEN ===== */
#fsGate {
    position: fixed;
    inset: 0;
    background: #0b0c10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#fsGate button {
    padding: 12px 20px;
    font-size: 18px;
    cursor: pointer;
}

/* ===== ROOMS ===== */
.room {
    display: none;
    height: 100vh;
    position: relative;
}

.room.active {
    display: block;
    animation: fade 0.5s ease;
}

@keyframes fade {
    from { opacity: 0; transform: scale(1.02); }
    to { opacity: 1; transform: scale(1); }
}

/* ===== LIGHT ===== */
.top {
    position: absolute;
    top: 10px;
    width: 100%;
}
.top img {
    width: min(180px, 40vw);
    animation: flicker 4s infinite;
}

@keyframes flicker {
    0%,100% {opacity:0.9}
    50% {opacity:1}
    52% {opacity:0.7}
}

/* ===== DOORS ===== */
.doors {
    position: absolute;
    bottom: 8vh;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 4vw;
}
.door img {
    width: min(160px, 28vw);
    cursor: pointer;
    transition: 0.3s;
}
.door img:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 0 10px white);
}

/* ===== ATMOSPHERE BASE ===== */
.room::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 50%);
}

/* ===== FX LAYER ===== */
.fx {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9998;
}

/* 🌫️ туман */
.fog {
    background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
    animation: fog 6s infinite;
}

@keyframes fog {
    0% {transform:translateX(-2%)}
    50% {transform:translateX(2%)}
    100% {transform:translateX(-2%)}
}

/* ❄️ снег */
.snow {
    background: url("https://i.ibb.co/6bQ7J1B/snow.gif");
    opacity: 0.15;
}

/* ⚡ гроза */
.storm {
    background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.1), transparent 40%);
    animation: flash 2.5s infinite;
}

@keyframes flash {
    92% {filter:brightness(2)}
    94% {filter:brightness(0.5)}
}

/* 🌧️ дождь */
.rain {
    background: url("https://i.imgur.com/r9G7QyQ.gif");
    opacity: 0.25;
    mix-blend-mode: screen;
}
</style>
</head>

<body>

<div id="fsGate">
    <h1>Бесконечный замок</h1>
    <button onclick="fs()">Войти</button>
</div>

<div id="fx" class="fx"></div>

<!-- ROOMS -->
<div class="room active" id="r1"><div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div><div class="doors"><div class="door"><img onclick="go(2)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div></div></div>

<div class="room" id="r2"><div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div><div class="doors"><div class="door"><img onclick="go(3)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div></div></div>

<div class="room" id="r3"><div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div><div class="doors"><div class="door"><img onclick="go(4)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div></div></div>

<div class="room" id="r4"><div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div><div class="doors"><div class="door"><img onclick="go(5)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div></div></div>

<div class="room" id="r5"><div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div><div class="doors"><div class="door"><img onclick="go(6)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div></div></div>

<div class="room" id="r6"><div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div><div class="doors"><div class="door"><img onclick="go(7)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div></div></div>

<div class="room" id="r7"><div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div><div class="doors"><div class="door"><img onclick="go(8)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div></div></div>

<div class="room" id="r8"><div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div><div class="doors"><div class="door"><img onclick="go(9)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div></div></div>

<div class="room" id="r9"><div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div><div class="doors"><div class="door"><img onclick="go(10)" src="https://i.postimg.cc/wvnQWtmk/dver.png"></div></div></div>

<div class="room" id="r10"><div class="top"><img src="https://i.postimg.cc/TwBJkyDC/lampa.png"></div><div class="doors"><div class="door"><img onclick="finish()" src="https://i.postimg.cc/ZRXxf9dr/otkrytayadver.png"></div></div></div>

<script>

let locked = false;

const fxMap = {
    1:"fog",
    2:"rain",
    3:"storm",
    4:"fog",
    5:"",
    6:"snow",
    7:"storm",
    8:"fog",
    9:"rain",
    10:"storm"
};

function fs(){
    document.documentElement.requestFullscreen();
    document.getElementById("fsGate").style.display = "none";
}

function go(n){
    if(locked) return;
    locked = true;

    setTimeout(()=>{
        document.querySelectorAll(".room").forEach(r=>r.classList.remove("active"));
        document.getElementById("r"+n).classList.add("active");

        const fx = document.getElementById("fx");
        fx.className = "fx " + (fxMap[n] || "");

        locked = false;
    },300);
}

function finish(){
    alert("Ты выбрался...");
}

</script>

</body>
</html>
